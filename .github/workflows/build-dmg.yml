# Build the operator-facing macOS disk image (.dmg).
#
#   • On a published RELEASE  -> build it and attach it to that release.
#   • Manually (Run workflow)  -> build a TEST .dmg and expose it as a workflow
#                                 artifact (a download link in the run output).
#                                 A manual run NEVER touches a release.
#
# COST NOTE (see CLAUDE.md): this repo is PUBLIC, so this workflow runs FREE on
# the STANDARD macos-latest runner — public repos do not consume metered Actions
# minutes on standard GitHub-hosted runners. It runs only on a published release
# or a manual click (no schedule/cron), and must never be switched to a
# larger/GPU runner (that tier is always billable, even on public repos).
name: Build release DMG

on:
  release:
    types: [published]
  workflow_dispatch:      # manual "Run workflow" button -> test build

# Least privilege: only what's needed to upload the .dmg as a release asset.
permissions:
  contents: write

jobs:
  build-dmg:
    # macos-latest is required — tools/build_dmg.sh uses hdiutil, which is
    # macOS-only. Keep this on the STANDARD runner; do not change the tier.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build the disk image
        run: bash tools/build_dmg.sh

      # Every run — including a manual test build — uploads the .dmg as a
      # workflow artifact, so the run summary has a download link. A manual
      # (workflow_dispatch) run stops here and never creates or edits a release.
      - name: Upload the .dmg as a workflow artifact
        id: artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-player-loader-macOS-dmg
          path: dist/audio-player-loader-macOS.dmg
          retention-days: 14

      - name: Show the download link
        run: echo "DMG built — download it here → ${{ steps.artifact.outputs.artifact-url }}"

      # Only when this run was triggered by publishing a release: also attach
      # the .dmg to that release as a downloadable asset.
      - name: Attach the .dmg to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/audio-player-loader-macOS.dmg --clobber
